<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrainTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c18; --surface:#0d1425; --surface2:#131d33; --surface3:#1a2540;
  --border:#1a2d45; --border2:#243a56; --border3:#2d4a6a;
  --accent:#06b6d4; --accent2:#3b82f6; --green:#10b981; --red:#ef4444;
  --amber:#f59e0b; --purple:#8b5cf6; --orange:#f97316;
  --text:#e2e8f0; --text-mid:#94a3b8; --text-dim:#4a6080;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:1000;}

/* ── Header ── */
header{position:sticky;top:0;z-index:200;background:rgba(8,12,24,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:50px;display:flex;align-items:center;gap:12px;}
.logo{font-family:var(--mono);font-size:.75rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.header-search-wrap{flex:1;max-width:420px;position:relative;}
.header-search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 12px 7px 34px;font-family:var(--sans);font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s;}
.header-search-wrap input:focus{border-color:var(--accent);}
.header-search-wrap input::placeholder{color:var(--text-dim);}
.search-icon-hdr{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:.85rem;pointer-events:none;}
.header-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.nav-btn{font-family:var(--mono);font-size:.65rem;letter-spacing:.06em;color:var(--text-mid);background:none;border:1px solid transparent;border-radius:4px;padding:5px 10px;cursor:pointer;transition:all .15s;text-decoration:none;text-transform:uppercase;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{color:var(--accent);border-color:var(--border2);background:var(--surface);}

/* ── Search dropdown ── */
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;overflow:hidden;z-index:300;display:none;box-shadow:0 16px 40px rgba(0,0,0,.6);}
.search-results.open{display:block;}
.search-result{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);}
.search-result:last-child{border-bottom:none;}
.search-result:hover{background:var(--surface2);}
.result-crs{font-family:var(--mono);font-size:.68rem;color:var(--accent);background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);border-radius:4px;padding:2px 6px;min-width:38px;text-align:center;}
.result-name{font-size:.85rem;color:var(--text);}
.result-type{font-size:.7rem;color:var(--text-dim);margin-left:auto;font-family:var(--mono);}

/* ── Views ── */
.view{display:none;}
.view.active{display:block;}

/* ── Home ── */
#home{min-height:calc(100vh - 50px);flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;}
#home.active{display:flex;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.2;mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,black,transparent);}
.hero{position:relative;text-align:center;max-width:500px;width:100%;}
.hero-tag{font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:16px;opacity:.8;}
.hero h1{font-family:var(--mono);font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;color:var(--text);line-height:1.1;margin-bottom:10px;}
.hero h1 span{color:var(--accent);}
.hero-sub{color:var(--text-mid);font-size:.88rem;margin-bottom:36px;line-height:1.6;}
.home-search-wrap{position:relative;width:100%;max-width:440px;margin:0 auto;}
.home-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;}
#home-search{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:13px 14px 13px 42px;font-family:var(--sans);font-size:.98rem;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
#home-search::placeholder{color:var(--text-dim);}
#home-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(6,182,212,.1);}
.home-search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:10px;overflow:hidden;z-index:200;display:none;box-shadow:0 20px 40px rgba(0,0,0,.5);}
.home-search-results.open{display:block;}
.quick-links{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;justify-content:center;}
.quick-chip{font-family:var(--mono);font-size:.64rem;letter-spacing:.06em;color:var(--text-mid);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.quick-chip:hover{color:var(--accent);border-color:var(--border2);}

/* ── Page layout ── */
.page{padding:20px;max-width:960px;margin:0 auto;}
.page.active{display:block;}
.back-btn{font-family:var(--mono);font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-mid);padding:5px 10px;cursor:pointer;transition:all .15s;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;}
.back-btn:hover{color:var(--text);border-color:var(--border2);}

/* ── Alert banners ── */
.banner-strip{margin-bottom:12px;display:flex;flex-direction:column;gap:6px;}
.alert-chip{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:6px;font-size:.8rem;line-height:1.4;cursor:pointer;}
.alert-chip.disruption{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.alert-chip.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd;}
.alert-chip.warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fcd34d;}
.nsi-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.nsi-chip{font-family:var(--mono);font-size:.62rem;letter-spacing:.04em;padding:4px 8px;border-radius:4px;cursor:pointer;color:#fff;white-space:nowrap;}
.nsi-good{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.3);color:var(--green);}

/* ── Board header ── */
.board-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.board-title{font-family:var(--mono);font-size:1rem;color:var(--text);}
.crs-badge{font-family:var(--mono);font-size:.68rem;color:var(--accent);background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);border-radius:4px;padding:3px 7px;}
.board-tabs{display:flex;gap:4px;}
.tab-btn{font-family:var(--mono);font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text-dim);padding:5px 12px;cursor:pointer;transition:all .15s;}
.tab-btn.active,.tab-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--accent);}
.refresh-indicator{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);margin-left:auto;}

/* ── Board rows ── */
.services-list{display:flex;flex-direction:column;gap:2px;}
.service-row{display:grid;grid-template-columns:52px 1fr auto 70px 74px;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden;}
.service-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:background .15s;background:var(--toc-col,var(--border2));}
.service-row:hover{border-color:var(--border2);background:var(--surface2);}
.service-row.cancelled{opacity:.55;}
.service-row.cancelled::before{background:var(--red);}
.service-row.late::before{background:var(--amber);}
.service-row.on-time::before{background:var(--green);}
.service-row.passing{opacity:.65;}
.service-row.freight::before{background:#8B4513;}
.service-row.ecs::before{background:#37474F;}
.service-row.bus::before{background:var(--accent2);}
.service-row:hover::before{filter:brightness(1.2);}

.svc-time{font-family:var(--mono);font-size:.92rem;font-weight:700;color:var(--text);white-space:nowrap;}
.svc-body{}
.svc-main{font-size:.86rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.svc-sub{font-size:.72rem;color:var(--text-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.svc-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.04em;padding:1px 5px;border-radius:3px;color:#fff;}
.tag.bus{background:var(--accent2);}
.tag.ecs{background:#37474F;}
.tag.freight{background:#8B4513;}
.tag.railtour{background:#7c3aed;}
.tag.ferry{background:#0891b2;}
.tag.split{background:rgba(139,92,246,.6);}
.tag.join{background:rgba(16,185,129,.4);}
.tag.passing{background:rgba(128,128,128,.3);}
.tag.cancelled{background:var(--red);}
.tag.var{background:var(--amber);}
.svc-hc{font-family:var(--mono);font-size:.65rem;color:var(--text-dim);text-align:right;white-space:nowrap;}
.svc-plat{font-family:var(--mono);font-size:.75rem;text-align:center;color:var(--text-mid);}
.svc-plat span{background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:2px 7px;}
.svc-status{font-family:var(--mono);font-size:.72rem;text-align:right;white-space:nowrap;}
.svc-status.on-time{color:var(--green);}
.svc-status.late{color:var(--amber);}
.svc-status.cancelled{color:var(--red);}
.svc-status.dim{color:var(--text-dim);}

.toc-bar{display:none;}  /* replaced by left border on ::before */

.board-loading,.board-empty{text-align:center;padding:50px 20px;color:var(--text-dim);font-family:var(--mono);font-size:.75rem;letter-spacing:.06em;}
.board-loading::after{content:'';display:block;width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;margin:14px auto 0;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Service detail ── */
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:16px 18px;margin-bottom:16px;}
.detail-hc{font-family:var(--mono);font-size:1.05rem;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-bottom:4px;}
.detail-route{font-size:.88rem;color:var(--text);margin-bottom:4px;}
.detail-meta{font-size:.75rem;color:var(--text-dim);font-family:var(--mono);}
.detail-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.unit-chip{font-family:var(--mono);font-size:.62rem;letter-spacing:.05em;color:var(--purple);background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:3px;padding:3px 7px;}
.coach-chip{font-family:var(--mono);font-size:.62rem;color:var(--text-mid);background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:3px 7px;}
.cancel-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:7px;padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:#fca5a5;}
.split-banner{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:7px;padding:9px 14px;margin-bottom:10px;font-size:.8rem;color:#c4b5fd;cursor:pointer;}
.split-banner:hover{background:rgba(139,92,246,.14);}
.join-banner{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:9px 14px;margin-bottom:10px;font-size:.8rem;color:#6ee7b7;cursor:pointer;}

.calling-list{position:relative;}
.cp-row{display:grid;grid-template-columns:24px 1fr 52px 64px;align-items:center;gap:8px;padding:8px 0;position:relative;}
.cp-row::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:1px;background:var(--border2);z-index:0;}
.cp-row:first-child::before{top:50%;}
.cp-row:last-child::before{bottom:50%;}
.cp-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);border:2px solid var(--bg);flex-shrink:0;position:relative;z-index:1;margin-left:3px;transition:background .2s;}
.cp-dot.passed{background:var(--green);}
.cp-dot.current{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.cp-dot.cancelled{background:var(--red);}
.cp-name{font-size:.85rem;color:var(--text);}
.cp-name.passed{color:var(--text-mid);}
.cp-name.cancelled{color:#fca5a5;text-decoration:line-through;}
.cp-crs{display:block;font-family:var(--mono);font-size:.62rem;color:var(--text-dim);margin-top:1px;}
.cp-sched{font-family:var(--mono);font-size:.78rem;color:var(--text-mid);text-align:right;}
.cp-actual{font-family:var(--mono);font-size:.78rem;text-align:right;}
.cp-actual.on-time{color:var(--green);}
.cp-actual.late{color:var(--amber);}
.cp-actual.cancelled{color:var(--red);}
.cp-actual.predicted{color:var(--text-dim);}
.detail-toggle-row{display:flex;gap:6px;margin-bottom:14px;}
.toggle-chip{font-family:var(--mono);font-size:.62rem;letter-spacing:.05em;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border2);color:var(--text-dim);background:var(--surface);transition:all .15s;}
.toggle-chip.active{background:var(--surface2);color:var(--accent);border-color:var(--border3);}

/* ── Station info ── */
.info-section{margin-bottom:18px;}
.info-section-title{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.info-row{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border);font-size:.83rem;}
.info-row:last-child{border-bottom:none;}
.info-icon{flex-shrink:0;width:18px;text-align:center;margin-top:1px;}
.info-text{color:var(--text);line-height:1.5;flex:1;}

/* ── HSP ── */
.hsp-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;}
.hsp-field{display:flex;flex-direction:column;gap:5px;min-width:160px;}
.hsp-label{font-family:var(--mono);font-size:.62rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}
.hsp-input{background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:8px 11px;font-size:.85rem;outline:none;font-family:var(--sans);transition:border-color .2s;cursor:pointer;}
.hsp-input:focus{border-color:var(--accent);}
.hsp-input option{background:var(--surface);}
.action-btn{font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;background:var(--accent2);color:#fff;border:none;border-radius:6px;padding:9px 18px;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.action-btn:hover{opacity:.85;}
.action-btn:disabled{opacity:.4;cursor:not-allowed;}
.hsp-table{width:100%;border-collapse:collapse;font-size:.82rem;}
.hsp-table th{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;font-weight:400;}
.hsp-table td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:.82rem;}
.hsp-table tr:last-child td{border-bottom:none;}
.hsp-table tr:hover td{background:var(--surface2);}
.hsp-table tr{cursor:pointer;}
.pct-good{color:var(--green);}
.pct-ok{color:var(--amber);}
.pct-bad{color:var(--red);}
.pct-na{color:var(--text-dim);}
.progress-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
.progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}

/* ── Unit diagram ── */
.diagram-list{display:flex;flex-direction:column;}
.diag-header{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;margin-top:12px;margin-bottom:2px;cursor:pointer;}
.diag-header:first-child{margin-top:0;}
.diag-hc{font-family:var(--mono);font-size:.85rem;font-weight:700;color:var(--accent);}
.diag-route{font-size:.82rem;color:var(--text);margin-top:2px;}
.diag-meta{font-size:.72rem;color:var(--text-dim);font-family:var(--mono);margin-top:3px;}
.diag-gap{font-family:var(--mono);font-size:.65rem;color:var(--text-dim);padding:6px 14px;letter-spacing:.06em;}
.diag-cp{display:grid;grid-template-columns:1fr 52px 64px;gap:8px;padding:5px 14px;font-size:.78rem;border-bottom:1px solid var(--border);}
.diag-cp:last-child{border-bottom:none;}
.diag-cp-name{color:var(--text-mid);}
.diag-cp-sched{font-family:var(--mono);color:var(--text-dim);text-align:right;}
.diag-cp-actual{font-family:var(--mono);text-align:right;}

/* ── TOC info panel ── */
.toc-panel{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:16px 18px;margin-bottom:14px;}
.toc-name{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:4px;}
.toc-meta{font-size:.78rem;color:var(--text-dim);font-family:var(--mono);}
.toc-nsi{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.toc-nsi-status{font-size:.82rem;padding:7px 10px;border-radius:5px;margin-bottom:6px;}
.toc-nsi-desc{font-size:.78rem;color:var(--text-mid);line-height:1.5;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);font-size:1.1rem;cursor:pointer;}
.modal-close:hover{color:var(--text);}
.modal-title{font-family:var(--mono);font-size:.85rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.modal-sub{font-size:.8rem;color:var(--text-dim);margin-bottom:16px;}
.modal-body{font-size:.85rem;color:var(--text);line-height:1.6;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── Responsive ── */
@media(max-width:600px){
  .service-row{grid-template-columns:46px 1fr 56px;}
  .svc-hc{display:none;}
  header{padding:0 10px;gap:6px;}
  .nav-btn{padding:4px 7px;font-size:.6rem;}
  .header-search-wrap{max-width:none;min-width:0;}
  .logo{font-size:.68rem;}
  .page{padding:14px 12px;}
  .board-header{gap:7px;}
  .board-title{font-size:.88rem;}
  .hsp-form{flex-direction:column;}
  .hsp-field{min-width:0;width:100%;}
  .cp-row{grid-template-columns:20px 1fr 44px 52px;}
  .detail-card{padding:12px 14px;}
  #theme-btn{display:none;}
}
@media(max-width:400px){
  .board-tabs .tab-btn{padding:4px 8px;font-size:.6rem;}
  .svc-plat{display:none;}
}

/* ── Light mode ── */
body.light {
  --bg:#f0f4f8; --surface:#ffffff; --surface2:#e8edf3; --surface3:#dce3ec;
  --border:#c8d3de; --border2:#b0bfcc; --border3:#96abbe;
  --text:#0f1923; --text-mid:#4a5568; --text-dim:#8a9ab0;
  --accent:#0891b2; --accent2:#2563eb; --green:#059669; --red:#dc2626;
  --amber:#d97706; --purple:#7c3aed; --orange:#ea580c;
}

</style>

<script>
// ══ State ══════════════════════════════════════════════════════════════════
let currentCrs='', currentTab='all', detailPrev='board', boardRefreshTimer=null, boardOffset=0;
let nsiData=[], incidentData=[], tocData={};
let hspPickerField='from', hspPickerTimer=null;

const TOC_COLORS = {
  AW:'#CC0033',CC:'#B20039',CH:'#00447C',CS:'#1C4EA0',EM:'#732982',ES:'#0F6CFD',
  GC:'#F58220',GN:'#003DA5',GR:'#E21836',GW:'#007A53',GX:'#E21836',HT:'#EB2226',
  HX:'#532B6F',IL:'#006CB7',LE:'#D10A11',LM:'#FF6600',LD:'#1568BF',LF:'#1568BF',
  LO:'#EE7C0E',ME:'#FFE600',NT:'#A71F25',SE:'#003CA6',SN:'#00A650',SR:'#1C4EA0',
  SW:'#006B75',TL:'#E21836',TP:'#005BAA',VT:'#004B87',XC:'#660F21',XR:'#6950A1'
};
const TOC_NAMES = {
  AW:'Transport for Wales',CC:'c2c',CH:'Chiltern Railways',CS:'Caledonian Sleeper',
  EM:'East Midlands Railway',ES:'Eurostar',GC:'Grand Central',GN:'Great Northern',
  GR:'LNER',GW:'Great Western Railway',GX:'Gatwick Express',HT:'Hull Trains',
  HX:'Heathrow Express',IL:'Island Line',LE:'Greater Anglia',LM:'West Midlands Trains',
  LD:'Lumo',LF:'Lumo',LO:'London Overground',ME:'Merseyrail',NT:'Northern Trains',
  SE:'Southeastern',SN:'Southern',SR:'ScotRail',SW:'South Western Railway',
  TL:'Thameslink',TP:'TransPennine Express',VT:'Avanti West Coast',
  XC:'CrossCountry',XR:'Elizabeth line'
};

function tocColor(code){return TOC_COLORS[code?.toUpperCase()]||'#334155';}
function tocName(code){return TOC_NAMES[code?.toUpperCase()]||code||'';}

// ══ View management ═════════════════════════════════════════════════════════
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const headerSearch = document.getElementById('header-search-container');
  headerSearch.style.display = id==='home' ? 'none' : '';
  document.getElementById('btn-hsp').style.display = (id==='board'||id==='detail'||id==='info') ? '' : 'none';
}
function goHome(){
  clearInterval(boardRefreshTimer);
  history.pushState({},'','/');
  showView('home');
}

// ══ Search ═══════════════════════════════════════════════════════════════════
function initSearch(inputId, resultsId){
  const input = document.getElementById(inputId);
  const results = document.getElementById(resultsId);
  let timer;
  input.addEventListener('input', ()=>{
    clearTimeout(timer);
    const q = input.value.trim();
    if(q.length<2){results.classList.remove('open');return;}
    timer = setTimeout(()=>doSearch(q,results), 200);
  });
  input.addEventListener('keydown', e=>{
    if(e.key==='Escape'){results.classList.remove('open');input.blur();}
  });
  document.addEventListener('click', e=>{
    if(!e.target.closest(`#${inputId}`)&&!e.target.closest(`#${resultsId}`))
      results.classList.remove('open');
  });
}

async function doSearch(q, resultsEl){
  // Detect headcode: 4-char alphanumeric like 1A23
  if(/^[0-9][A-Z0-9][0-9]{2}$/i.test(q.trim())){
    resultsEl.innerHTML = `<div class="search-result" data-type="hc" data-val="${esc(q.trim().toUpperCase())}">
      <span class="result-crs" style="color:var(--amber);background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3)">${esc(q.trim().toUpperCase())}</span>
      <span class="result-name">Search headcode ${esc(q.trim().toUpperCase())}</span>
      <span class="result-type">HEADCODE</span>
    </div>`;
    resultsEl.classList.add('open');
    bindResultClicks(resultsEl);
    return;
  }
  // Detect unit number: 5-6 digits
  if(/^\d{5,6}$/.test(q.trim())){
    resultsEl.innerHTML = `<div class="search-result" data-type="unit" data-val="${esc(q.trim())}">
      <span class="result-crs" style="color:var(--purple);background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3)">${esc(q.trim())}</span>
      <span class="result-name">Unit ${esc(q.trim())} diagram</span>
      <span class="result-type">UNIT</span>
    </div>`;
    resultsEl.classList.add('open');
    bindResultClicks(resultsEl);
    return;
  }
  // Station search
  try{
    const res = await fetch(`/api/stations?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if(!data.length){resultsEl.classList.remove('open');return;}
    resultsEl.innerHTML = data.map(s=>`
      <div class="search-result" data-type="station" data-crs="${esc(s.crs)}" data-name="${esc(s.name)}">
        <span class="result-crs">${esc(s.crs)}</span>
        <span class="result-name">${esc(s.name)}</span>
      </div>`).join('');
    resultsEl.classList.add('open');
    bindResultClicks(resultsEl);
  }catch(e){resultsEl.classList.remove('open');}
}

function bindResultClicks(el){
  el.querySelectorAll('.search-result').forEach(r=>{
    r.addEventListener('click',()=>{
      el.classList.remove('open');
      const type=r.dataset.type;
      if(type==='station') loadStation(r.dataset.crs, r.dataset.name);
      else if(type==='hc') loadHeadcode(r.dataset.val);
      else if(type==='unit') loadUnit(r.dataset.val);
      document.getElementById('home-search').value='';
      document.getElementById('header-search').value='';
    });
  });
}

// Quick chips
document.querySelectorAll('.quick-chip').forEach(c=>{
  c.addEventListener('click',()=>loadStation(c.dataset.crs, c.dataset.name));
});

// ══ Station board ═══════════════════════════════════════════════════════════
async function loadStation(crs, name){
  currentCrs = crs;
  boardOffset = 0;
  document.getElementById('board-title').textContent = name;
  document.getElementById('board-crs').textContent = crs;
  showView('board');
  clearInterval(boardRefreshTimer);
  // Fetch NSI, incidents, TOC data in background
  fetchNsi();
  fetchIncidents(crs);
  fetchBoard();
  boardRefreshTimer = setInterval(fetchBoard, 30000);
}

function setTab(tab){
  currentTab=tab;
  ['all','dep','arr'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  fetchBoard();
}

async function fetchBoard(){
  const ep = currentTab==='arr'?'arrivals':currentTab==='dep'?'departures':'allservices';
  try{
    const offsetParam = boardOffset!==0 ? `&offset=${boardOffset}` : '';
    const res = await fetch(`/api/${ep}?crs=${currentCrs}&window=120${offsetParam}`);
    const data = await res.json();
    renderBoard(data.services||[]);
    document.getElementById('refresh-ts').textContent =
      'Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    // Show NRCC messages
    const msgs = data.nrccMessages||[];
    renderBoardBanners(msgs);
  }catch(e){
    document.getElementById('board-content').innerHTML='<div class="board-empty">Failed to load</div>';
  }
}

function renderBoardBanners(msgs){
  const strip = document.getElementById('board-banners');
  const existing = strip.querySelectorAll('.nrcc-chip');
  existing.forEach(e=>e.remove());
  msgs.forEach(msg=>{
    const sev = /cancel|delay|disrupt/i.test(msg)?'disruption':'info';
    const chip = document.createElement('div');
    chip.className=`alert-chip ${sev} nrcc-chip`;
    chip.innerHTML=`<span>ℹ</span><span>${esc(msg.length>80?msg.slice(0,80)+'…':msg)}</span>`;
    chip.addEventListener('click',()=>showModal('Station Notice',null,msg));
    strip.appendChild(chip);
  });
}

function renderBoard(services){
  if(!services.length){
    document.getElementById('board-content').innerHTML='<div class="board-empty">No services found</div>';
    return;
  }
  const rows = services.map(s=>{
    const isDep = currentTab!=='arr';
    const dest = isDep
      ? (s.destName||s.destCrs||'—')
      : (s.originName||s.originCrs||'—');
    const sub = isDep
      ? (currentTab==='all'&&s.originName?`From ${s.originName}`:'')
      : (s.destName?`To ${s.destName}`:'');

    const {cls,label} = svcStatus(s);
    const tocCol = tocColor(s.atocCode);
    const tags = buildTags(s);
    const units = s.units?.length ? `<div class="svc-sub" style="color:var(--purple)">${esc(s.units.join(' + '))}</div>` : '';
    const nsiEntry = nsiData.find(n=>n.tocCode===s.atocCode);
    const nsiDot = (nsiEntry&&!nsiEntry.isGood)
      ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${nsiEntry.isSevere?'var(--red)':nsiEntry.isMajor?'var(--orange)':'var(--amber)'};margin-left:4px;vertical-align:middle" title="${esc(nsiEntry.statusLabel)}"></span>` : '';

    return `<div class="service-row ${cls}" data-uid="${esc(s.uid)}" data-hc="${esc(s.headcode)}" data-toc-col="${tocCol}">
      <div class="toc-bar"></div>
      <div class="svc-time">${esc(s.scheduledTime)}</div>
      <div class="svc-body">
        <div class="svc-main">${esc(dest)}${nsiDot}</div>
        ${sub?`<div class="svc-sub">${esc(sub)}</div>`:''}
        ${units}
        ${tags?`<div class="svc-tags">${tags}</div>`:''}
      </div>
      <div class="svc-hc">${esc(s.headcode)}<br><span style="color:var(--text-dim)">${esc(tocName(s.atocCode))}</span></div>
      <div class="svc-plat">${s.platform?`<span>${esc(s.platform)}</span>`:''}</div>
      <div class="svc-status ${cls}">${label}</div>
    </div>`;
  }).join('');
  document.getElementById('board-content').innerHTML=`<div class="services-list">${rows}</div>`;
  // Apply TOC brand colours to left bar
  document.querySelectorAll('.service-row[data-toc-col]').forEach(row=>{
    row.style.setProperty('--toc-col', row.dataset.tocCol);
  });
  // Bind clicks
  document.querySelectorAll('.service-row').forEach(row=>{
    row.addEventListener('click',()=>{
      detailPrev='board';
      loadService(row.dataset.uid, row.dataset.hc);
    });
  });
}

function buildTags(s){
  const tags=[];
  if(s.isCancelled) tags.push('<span class="tag cancelled">Cancelled</span>');
  else if(s.scheduleTag==='VAR') tags.push('<span class="tag var">Variation</span>');
  if(s.scheduleTag==='BUS') tags.push('<span class="tag bus">Bus</span>');
  else if(s.scheduleTag==='FERRY') tags.push('<span class="tag ferry">Ferry</span>');
  if(s.category==='FREIGHT') tags.push('<span class="tag freight">Freight</span>');
  else if(s.category==='ECS') tags.push('<span class="tag ecs">ECS</span>');
  else if(s.category==='RAILTOUR') tags.push('<span class="tag railtour">Railtour</span>');
  if(s.isServicePassing) tags.push('<span class="tag passing">Passing</span>');
  if(s.splitTiploc) tags.push('<span class="tag split">✂ Splits</span>');
  if(s.couplingTiploc) tags.push('<span class="tag join">🔗 Joins</span>');
  return tags.join('');
}

function svcStatus(s){
  if(s.isCancelled) return{cls:'cancelled',label:'Cancelled'};
  if(!s.actualTime) return{cls:'',label:'On time'};
  const diff=timeDiff(s.scheduledTime,s.actualTime);
  if(diff<=1) return{cls:'on-time',label:s.actualTime};
  return{cls:'late',label:`+${diff}m`};
}

function timeDiff(sched,actual){
  if(!sched||!actual) return 0;
  const[sh,sm]=sched.split(':').map(Number);
  const[ah,am]=actual.split(':').map(Number);
  let d=(ah*60+am)-(sh*60+sm);
  if(d<-120) d+=1440;
  return d;
}

// ══ NSI / Incidents ══════════════════════════════════════════════════════════
async function fetchNsi(){
  try{
    const res=await fetch('/api/kb/nsi');
    nsiData=await res.json();
    renderNsi();
  }catch(e){}
}

function renderNsi(){
  const strip=document.getElementById('nsi-strip');
  if(!nsiData.length){strip.style.display='none';return;}
  const bad=nsiData.filter(n=>!n.isGood);
  if(!bad.length){
    strip.innerHTML='<span class="nsi-chip nsi-good">✓ Good service on all operators</span>';
    strip.style.display='flex';
    return;
  }
  // Cap at 4 visible — too many chips swamp the UI
  const visible = bad.slice(0, 4);
  const hidden = bad.slice(4);
  strip.innerHTML=visible.map(n=>{
    const bg=n.isSevere?'rgba(239,68,68,.25)':n.isMajor?'rgba(249,115,22,.25)':'rgba(245,158,11,.2)';
    const col=n.isSevere?'#fca5a5':n.isMajor?'#fdba74':'#fcd34d';
    return `<span class="nsi-chip" style="background:${bg};border:1px solid ${bg};color:${col};cursor:pointer" 
      data-toc="${esc(n.tocCode)}">${esc(n.statusEmoji||'⚠')} ${esc(n.tocName)} · ${esc(n.statusLabel)}</span>`;
  }).join('')
  + (hidden.length ? `<span class="nsi-chip" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);cursor:pointer" id="nsi-show-more">+${hidden.length} more</span>` : '');
  strip.style.display='flex';
  strip.querySelectorAll('.nsi-chip[data-toc]').forEach(c=>{
    c.addEventListener('click',()=>{
      const entry=nsiData.find(n=>n.tocCode===c.dataset.toc);
      if(entry) showNsiDetail(entry);
    });
  });
  const moreBtn=strip.querySelector('#nsi-show-more');
  if(moreBtn) moreBtn.addEventListener('click',()=>{
    // Show all on click
    strip.innerHTML=bad.map(n=>{
      const bg=n.isSevere?'rgba(239,68,68,.25)':n.isMajor?'rgba(249,115,22,.25)':'rgba(245,158,11,.2)';
      const col=n.isSevere?'#fca5a5':n.isMajor?'#fdba74':'#fcd34d';
      return `<span class="nsi-chip" style="background:${bg};border:1px solid ${bg};color:${col};cursor:pointer" 
        data-toc="${esc(n.tocCode)}">${esc(n.statusEmoji||'⚠')} ${esc(n.tocName)} · ${esc(n.statusLabel)}</span>`;
    }).join('');
    strip.querySelectorAll('.nsi-chip').forEach(c=>{
      c.addEventListener('click',()=>{

// ══ Unit diagram ═════════════════════════════════════════════════════════════
async function loadUnit(unit){
  document.getElementById('unit-title').textContent=`Unit ${unit}`;
  document.getElementById('unit-content').innerHTML='<div class="board-loading">Loading</div>';
  showView('unitview');
  try{
    const res=await fetch(`/api/unit/${unit}`);
    const svcs=await res.json();
    if(!svcs.length){
      document.getElementById('unit-content').innerHTML='<div class="board-empty">No diagram data for unit '+esc(unit)+'</div>';
      return;
    }
    // Fetch calling points for each service in parallel
    const cpResults=await Promise.all(svcs.map(s=>
      fetch(`/api/service/${s.uid}?crs=${s.originCrs||''}`)
        .then(r=>r.json()).catch(()=>null)
    ));
    let html='<div class="diagram-list">';
    svcs.forEach((s,i)=>{
      const cp=cpResults[i];
      const allPts=[...(cp?.previous||[]),...(cp?.subsequent||[])];
      // Gap between services
      if(i>0){
        const prev=svcs[i-1];
        const prevCp=cpResults[i-1];
        const prevLast=[...(prevCp?.previous||[]),...(prevCp?.subsequent||[])].at(-1);
        const gapStr=buildGapLabel(prev,s,prevLast?.at||prevLast?.st||'');
        if(gapStr) html+=`<div class="diag-gap">${esc(gapStr)}</div>`;
      }
      const tocCol=tocColor(s.atocCode);
      html+=`<div class="diag-header" data-uid="${esc(s.uid)}" data-hc="${esc(s.headcode||'')}">
        <div style="border-left:3px solid ${tocCol};padding-left:10px">
          <div class="diag-hc">${esc(s.headcode||s.uid)}</div>
          <div class="diag-route">${esc(s.originName||s.originCrs||'?')} → ${esc(s.destName||s.destCrs||'?')}</div>
          <div class="diag-meta">${esc(tocName(s.atocCode))} · ${esc(s.scheduledTime||'')}</div>
        </div>
      </div>`;
      if(allPts.length){
        html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:0 0 6px 6px;border-top:none;margin-bottom:0">';
        allPts.forEach(pt=>{
          const sched=pt.st||'';
          const actual=pt.at||'';
          const diff=actual&&sched?timeDiff(sched,actual):0;
          const cls=pt.isCancelled?'cancelled':diff>1?'late':'on-time';
          const actualStr=actual?`<span class="cp-actual ${cls}">${diff>1?'+'+diff+'m':actual}</span>`:'<span class="cp-actual"></span>';
          html+=`<div class="diag-cp">
            <div class="diag-cp-name">${esc(pt.name||pt.crs||pt.tiploc||'')}</div>
            <div class="diag-cp-sched">${esc(sched)}</div>
            ${actualStr}
          </div>`;
        });
        html+='</div>';
      }
    });
    html+='</div>';
    document.getElementById('unit-content').innerHTML=html;
    document.querySelectorAll('.diag-header').forEach(h=>{
      h.addEventListener('click',()=>{
        detailPrev='unitview';
        loadService(h.dataset.uid,h.dataset.hc,'');
      });
    });
  }catch(e){
    document.getElementById('unit-content').innerHTML='<div class="board-empty">Failed to load unit diagram</div>';
  }
}

function buildGapLabel(prevSvc, nextSvc, prevArrTime){
  const prevDep=prevSvc.scheduledTime||'';
  const nextDep=nextSvc.scheduledTime||'';
  if(!prevArrTime||!nextDep) return '';
  try{
    const[ah,am]=prevArrTime.split(':').map(Number);
    const[nh,nm]=nextDep.split(':').map(Number);
    let mins=(nh*60+nm)-(ah*60+am);
    if(mins<0) mins+=1440;
    if(mins===0) return '';
    return `— Stabled ${mins} min —`;
  }catch(e){return '';}
}

async function loadService(uid, headcode, crs=''){

function renderDetail(data, headcode, uid){
  currentDetailData=data; currentDetailHeadcode=headcode; currentDetailUid=uid;
  const allPts=[...(data.previous||[]),...(data.subsequent||[])];
  const atIdx=data.previous?.length??0;
  let html='';

  // Header card
  const first=allPts[0], last=allPts.at(-1);
  const route=`${first?.name||first?.crs||'?'} → ${last?.name||last?.crs||'?'}`;
  const isCancelled=allPts.some(p=>p.isCancelled)||data.isCancelled;
  const units=(data.subsequent?.[0]?.units||data.units||[]);
  const coachCount=data.coachCount||0;
  const tocCode=data.atocCode||data.operator||'';

  html+=`<div class="detail-card">
    <div style="border-left:3px solid ${tocColor(tocCode)};padding-left:12px">
      <div class="detail-hc">${esc(headcode)}</div>
      <div class="detail-route">${esc(route)}</div>
      <div class="detail-meta">${esc(tocName(tocCode))}${data.atCrs?` · ${esc(data.atCrs)}`:''}</div>
      <div class="detail-chips" id="detail-chips" style="display:${units.length||coachCount?'flex':'none'}">
        ${units.map(u=>`<span class="unit-chip">${esc(u)}</span>`).join('')}
        ${coachCount?`<span class="coach-chip">${coachCount} coaches</span>`:''}
      </div>
    </div>
  </div>`;

  if(isCancelled){
    html+=`<div class="cancel-banner">⚠ This service is cancelled.</div>`;
  }

  // Split / coupling info
  if(data.splitTiploc||data.splitTiplocName){
    const at=data.splitTiplocName||data.splitTiploc;
    const to=data.splitToHeadcode?` → ${data.splitToHeadcode}`:'';
    html+=`<div class="split-banner" ${data.splitToUid?`data-uid="${esc(data.splitToUid)}" data-hc="${esc(data.splitToHeadcode||'')}"`:''}
      >✂ Splits at ${esc(at)}${esc(to)}</div>`;
  }
  if(data.couplingTiploc||data.couplingTiplocName){
    const at=data.couplingTiplocName||data.couplingTiploc;
    const from=data.coupledFromHeadcode?` from ${data.coupledFromHeadcode}`:'';
    html+=`<div class="join-banner">🔗 Joins${esc(from)} at ${esc(at)}</div>`;
  }

  // Toggle: simple / detailed
  html+=`<div class="detail-toggle-row">
    <span class="toggle-chip active" id="tog-simple" onclick="toggleDetail(false)">Simple</span>
    <span class="toggle-chip" id="tog-detailed" onclick="toggleDetail(true)">Detailed</span>
  </div>`;

  // Calling points
  html+=`<div class="calling-list" id="cp-list">`;
  allPts.forEach((cp,i)=>{
    const isPassed=i<atIdx;
    const isCurr=i===atIdx;
    const dotCls=cp.isCancelled?'cancelled':isPassed?'passed':isCurr?'current':'';
    const nameCls=cp.isCancelled?'cancelled':isPassed?'passed':'';
    const name=cp.name||cp.crs||cp.tiploc||'?';
    const{cpCls,cpLabel}=cpStatus(cp);
    const passNote=cp.isPass?'<span style="font-size:.65rem;color:var(--text-dim);font-family:var(--mono);margin-left:4px">(passing)</span>':'';
    html+=`<div class="cp-row" data-passing="${cp.isPass?'1':'0'}" data-crs="${cp.crs||''}">
      <div class="cp-dot ${dotCls}"></div>
      <div class="cp-name ${nameCls}">
        ${esc(name)}${passNote}
        ${cp.crs?`<span class="cp-crs">${esc(cp.crs)}</span>`:''}
      </div>
      <div class="cp-sched">${esc(cp.st||cp.scheduledTime||'')}</div>
      <div class="cp-actual ${cpCls}">${cpLabel}</div>
    </div>`;
  });
  html+=`</div>`;

  document.getElementById('detail-content').innerHTML=html;
  // Apply simple mode by default — hide passing stops and junction-only rows (no CRS)
  document.querySelectorAll('.cp-row').forEach(r=>{
    const isPass = r.dataset.passing==='1';
    const hasCrs = r.dataset.crs && r.dataset.crs.length===3;
    if(isPass || !hasCrs) r.style.display='none';
  });

  // Wire split click
  const splitEl=document.querySelector('.split-banner[data-uid]');
  if(splitEl) splitEl.addEventListener('click',()=>{
    detailPrev='detail';
    loadService(splitEl.dataset.uid,splitEl.dataset.hc,'');
  });
}

let showPassing=false;
function toggleDetail(detailed){
  showPassing=detailed;
  document.getElementById('tog-simple').classList.toggle('active',!detailed);
  document.getElementById('tog-detailed').classList.toggle('active',detailed);
  // Simple: show only stops with a CRS code and not isPass
  // Detailed: show everything
  document.querySelectorAll('.cp-row').forEach(r=>{
    const isPass = r.dataset.passing==='1';
    const hasCrs = r.dataset.crs && r.dataset.crs.length===3;
    if(detailed){
      r.style.display='grid';
    } else {
      r.style.display = (!isPass && hasCrs) ? 'grid' : 'none';
    }
  });
}

function cpStatus(cp){
  if(cp.isCancelled) return{cpCls:'cancelled',cpLabel:'Canc.'};
  const actual=cp.at||cp.actualTime||'';
  if(!actual) return{cpCls:'',cpLabel:''};
  const sched=cp.st||cp.scheduledTime||'';
  if(cp.isPredicted) return{cpCls:'predicted',cpLabel:`~${actual}`};
  const diff=timeDiff(sched,actual);
  if(diff<=1) return{cpCls:'on-time',cpLabel:actual};
  return{cpCls:'late',cpLabel:actual};
}

async function runHsp(){
  const from=document.getElementById('hsp-from-crs').value.trim().toUpperCase();
  const to=document.getElementById('hsp-to-crs').value.trim().toUpperCase();
  const date=document.getElementById('hsp-date').value;
  if(!from||!to||!date){showModal('Missing Fields',null,'Please select From station, To station, and a date.');return;}
  if(from===to){showModal('Invalid Search',null,'From and To stations must be different.');return;}
  document.getElementById('hsp-search-btn').disabled=true;
  document.getElementById('hsp-status').textContent='Searching…';
  document.getElementById('hsp-progress-wrap').style.display='';
  document.getElementById('hsp-progress-bar').style.width='0%';
  document.getElementById('hsp-content').innerHTML='';
  try{
    const res=await fetch(`/api/hsp/metrics/stream?from=${from}&to=${to}&date=${date}`);
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    let lastRows=[];
    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        try{
          const ev=JSON.parse(line.slice(5));
          if(ev.timedOut){
            document.getElementById('hsp-status').textContent='Timed out — results may be partial. Try again.';
            break;
          }
          document.getElementById('hsp-progress-bar').style.width=(ev.progress||0)+'%';
          document.getElementById('hsp-status').textContent=
            ev.progress<100?`Loading… ${ev.progress}% · ${(ev.services||[]).length} services`:'';
          lastRows=ev.services||[];
          renderHspResults(lastRows,false);
        }catch(e){}
      }
    }
    renderHspResults(lastRows,true);
  }catch(e){
    document.getElementById('hsp-status').textContent='Search failed: '+(e.message||'Unknown error');
  }
  document.getElementById('hsp-search-btn').disabled=false;
  document.getElementById('hsp-progress-wrap').style.display='none';
}

function renderHspResults(rows,final){
  if(!rows.length){
    if(final) document.getElementById('hsp-content').innerHTML='<div class="board-empty">No services found</div>';
    return;
  }
  const summary=final?`<div style="font-family:var(--mono);font-size:.72rem;color:var(--text-dim);margin-bottom:10px">${rows.length} services</div>`:'';
  const sorted=[...rows].sort((a,b)=>(a.scheduledDep||'').localeCompare(b.scheduledDep||''));
  const tableRows=sorted.map(r=>{
    const pct=r.punctualityPct>=0?r.punctualityPct:-1;
    const pctCls=pct<0?'pct-na':pct>=90?'pct-good':pct>=75?'pct-ok':'pct-bad';
    const pctStr=pct<0?'No data':`${pct}%`;
    const time=r.scheduledDep||r.scheduledArr||'?';
    return `<tr data-rid="${esc(r.rid)}" data-dep="${esc(r.scheduledDep||'')}" data-ocrs="${esc(r.originCrs||'')}" data-arr="${esc(r.scheduledArr||'')}" data-dtiploc="${esc(r.destTiploc||'')}">
      <td>${esc(time)}</td>
      <td>${esc(r.originName||r.originCrs||'?')}</td>
      <td>${esc(r.destName||'?')}</td>
      <td>${esc(r.tocName||'')}</td>
      <td class="${pctCls}">${pctStr}</td>
      <td style="color:var(--text-dim)">${r.total>0?r.total:''}</td>
    </tr>`;
  }).join('');
  document.getElementById('hsp-content').innerHTML=`${summary}
    <div style="overflow-x:auto"><table class="hsp-table">
      <thead><tr><th>Time</th><th>From</th><th>To</th><th>TOC</th><th>On time</th><th>Runs</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>`;
  document.querySelectorAll('.hsp-table tbody tr').forEach(tr=>{
    tr.addEventListener('click',()=>loadHspDetail(tr.dataset.rid,tr.dataset.dep,tr.dataset.ocrs,tr.dataset.arr,tr.dataset.dtiploc));
  });
}

async function loadHspDetail(rid,dep,ocrs,arr,dtiploc){
  showModal('Loading calling points…','Please wait…','');
  try{
    const res=await fetch('/api/hsp/details',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({rid,scheduled_dep:dep,origin_crs:ocrs,scheduled_arr:arr,dest_tiploc:dtiploc})
    });
    const data=await res.json();
    const unitSummary=data.units?.join(' + ')||data.unit||'';
    const rows=(data.locations||[]).map(loc=>{
      const sched=loc.scheduledDep||loc.scheduledArr||'';
      const actual=loc.actualDep||loc.actualArr||'';
      const delay=actual&&sched?timeDiff(sched,actual):0;
      const status=loc.cancelReason?'Cancelled':actual?(delay>0?`${actual} (+${delay}m)`:`On time (${actual})`):actual||'—';
      const cls=loc.cancelReason?'pct-bad':delay>0?'pct-ok':'pct-good';
      return `<tr><td>${esc(sched)}</td><td>${esc(loc.name||loc.tiploc||'')}</td><td class="${cls}">${esc(status)}</td></tr>`;
    }).join('');
    const body=`${unitSummary?`<div style="font-family:var(--mono);font-size:.75rem;color:var(--text-dim);margin-bottom:12px">Unit: ${esc(unitSummary)}</div>`:''}
      <div style="overflow-x:auto"><table class="hsp-table">
        <thead><tr><th>Time</th><th>Station</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    showModal('Calling Points','Historical service',body,true);
  }catch(e){
    showModal('Error',null,'Failed to load calling points.');
  }
}

// ══ Modal ═════════════════════════════════════════════════════════════════════
function showModal(title,sub,body,isHtml=false){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-sub').textContent=sub||'';
  document.getElementById('modal-sub').style.display=sub?'':'none';
  if(isHtml) document.getElementById('modal-body').innerHTML=body;
  else document.getElementById('modal-body').textContent=body;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

// ══ Utils ═════════════════════════════════════════════════════════════════════
function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══ Time offset ══════════════════════════════════════════════════════════════
function shiftOffset(mins){
  boardOffset += mins;
  document.getElementById('btn-now').classList.toggle('active', boardOffset===0);
  fetchBoard();
  clearInterval(boardRefreshTimer);
  // Only auto-refresh if at current time
  if(boardOffset===0) boardRefreshTimer=setInterval(fetchBoard,30000);
}
function resetOffset(){
  boardOffset=0;
  document.getElementById('btn-now').classList.add('active');
  fetchBoard();
  clearInterval(boardRefreshTimer);
  boardRefreshTimer=setInterval(fetchBoard,30000);
}

// ══ Theme ════════════════════════════════════════════════════════════════════
function toggleTheme(){
  document.body.classList.toggle('light');
  const isLight=document.body.classList.contains('light');
  localStorage.setItem('tt_theme',isLight?'light':'dark');
  document.getElementById('theme-btn').textContent=isLight?'🌙':'☀';
}
function initTheme(){
  const saved=localStorage.getItem('tt_theme');
  if(saved==='light'){
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent='🌙';
  }
}

// ══ Share & deep links ════════════════════════════════════════════════════════
let currentDetailData=null, currentDetailHeadcode='', currentDetailUid='';

function shareService(){
  if(!currentDetailData) return;
  const d=currentDetailData;
  const allPts=[...(d.previous||[]),...(d.subsequent||[])];
  const first=allPts[0], last=allPts.at(-1);
  const units=(d.units||[]).join(' + ');
  const lines=[
    `${first?.name||first?.crs||'?'} → ${last?.name||last?.crs||'?'}`,
    currentDetailHeadcode?`Headcode: ${currentDetailHeadcode}`:'',
    d.atocCode?`Operator: ${tocName(d.atocCode)}`:'',
    units?`Unit: ${units}`:'',
    ``,
    `via TrainTracker: ${location.origin}/?service=${currentDetailUid}&crs=${currentCrs}`
  ].filter((l,i)=>i===4||l!=='').join('\n');

  if(navigator.share){
    navigator.share({title:`${currentDetailHeadcode} · TrainTracker`,text:lines})
      .catch(()=>fallbackCopy(lines));
  } else {
    fallbackCopy(lines);
  }
}

function copyServiceLink(){
  const url=`${location.origin}/?service=${currentDetailUid}&crs=${currentCrs}`;
  navigator.clipboard.writeText(url).then(()=>{
    showToast('Link copied!');
  }).catch(()=>fallbackCopy(url));
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('Copied!');
}

function showToast(msg){
  let t=document.getElementById('tt-toast');
  if(!t){
    t=document.createElement('div');
    t.id='tt-toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:.72rem;padding:8px 18px;border-radius:6px;z-index:600;letter-spacing:.06em;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.opacity='0',2000);
}

// Handle ?service=UID&crs=CRS deep links
function handleDeepLink(){
  const p=new URLSearchParams(location.search);
  const uid=p.get('service');
  const crs=p.get('crs')||'';
  const hc=p.get('hc')||'';
  const stationCrs=p.get('station');
  if(uid){
    currentCrs=crs;
    detailPrev='home';
    loadService(uid,hc,crs);
    return true;
  }
  if(stationCrs){
    loadStation(stationCrs, stationCrs);
    return true;
  }
  return false;
}

// ══ Init ══════════════════════════════════════════════════════════════════════════════
initSearch('home-search','home-results');
initSearch('header-search','header-results');
initTheme();
handleDeepLink();

// Close modals on Escape
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeHspPicker();}
});
</script>
